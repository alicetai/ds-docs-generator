<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root {
      --color-purple: #6457f9;
      --color-secondary: #717680;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      color: #111;
      background: #fff;
      padding: 0;
      margin: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 33.33%;
      padding: 24px 20px 20px;
      overflow-y: auto;
      border-right: 1px solid #e5e7eb;
    }

    .preview-container {
      width: 66.67%;
      overflow-y: auto;
      background: #fafafa;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .icon {
      width: 32px;
      height: 32px;
      background: var(--color-purple);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .icon svg { display: block; }
    h1 { font-size: 15px; font-weight: 600; color: #111; }
    .subtitle {
      font-size: 12px;
      color: var(--color-secondary);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* ── Component pill ── */
    .component-pill {
      display: none;
      align-items: center;
      gap: 8px;
      background: #f4f3ff;
      border: 1px solid #dddaff;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 20px;
    }
    .component-pill.visible { display: flex; }
    .pill-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-purple);
      flex-shrink: 0;
    }
    .pill-label { font-size: 11px; color: #888; }
    .pill-name  { font-size: 13px; font-weight: 600; color: #3730a3; }

    /* ── Message ── */
    .message {
      display: none;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .message.visible { display: flex; align-items: flex-start; gap: 8px; }
    .message.error   { background: #fff1f1; color: #c0392b; border: 1px solid #ffc7c7; }
    .message.warning { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
    .message-icon { flex-shrink: 0; margin-top: 1px; }
    .message.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

    /* ── Sidebar loading (for Add documentation) ── */
    .loading {
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--color-secondary);
      margin-bottom: 16px;
    }
    .loading.visible { display: flex; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid #e5e7eb;
      border-top-color: var(--color-purple);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s, opacity 0.15s;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary { background: var(--color-purple); color: #fff; }
    .btn-primary:hover { background: #5244e0; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }


    /* ── Preview Section ── */
    .preview-section {
      display: none;
      height: 100%;
    }
    .preview-section.visible { display: flex; flex-direction: column; }

    .preview-content {
      flex: 1;
      overflow-y: auto;
      background: white;
      display: flex;
      flex-direction: column;
    }
    .preview-pane {
      display: none;
      padding: 24px;
      flex: 1;
      overflow-y: auto;
    }
    .preview-pane.active { display: block; }

    /* ── Preview Footer (Add documentation button) ── */
    .preview-footer {
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
      background: #fff;
      flex-shrink: 0;
      display: flex;
      justify-content: flex-end;
    }
    .preview-footer .btn {
      width: auto;
      margin-bottom: 0;
    }

    /* ── Empty State ── */
    .preview-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #999;
      font-size: 14px;
      text-align: center;
      padding: 40px;
    }

    /* ── Preview Loading State ── */
    .preview-loading {
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      height: 100%;
      color: var(--color-secondary);
      font-size: 13px;
    }
    .preview-loading.visible { display: flex; }
    .preview-loading .spinner {
      width: 24px;
      height: 24px;
      border-width: 2.5px;
    }

    /* ── Section Cards (Edit pane) ── */
    .section-card {
      background: #f5f5f5;
      border-radius: 8px;
      margin-bottom: 10px;
      position: relative;
    }
    .section-delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--color-secondary);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.4;
      transition: opacity 0.1s;
      z-index: 1;
    }
    .section-delete-btn:hover { opacity: 1; }
    .section-body-textarea {
      width: 100%;
      padding: 12px 36px 12px 12px;
      font-family: ui-monospace, 'SF Mono', Monaco, 'Cascadia Code', monospace;
      font-size: 11px;
      line-height: 1.6;
      border: none;
      resize: none;
      outline: none;
      background: transparent;
      color: #111;
      display: block;
      overflow: hidden;
    }
    .btn-add-section {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 2px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--color-purple);
      font-family: inherit;
      opacity: 0.8;
      transition: opacity 0.15s;
    }
    .btn-add-section:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="header">
      <div class="icon">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <rect x="2" y="2" width="6" height="6" rx="1.5" fill="white" opacity="0.9"/>
          <rect x="10" y="2" width="6" height="6" rx="1.5" fill="white" opacity="0.6"/>
          <rect x="2" y="10" width="6" height="6" rx="1.5" fill="white" opacity="0.6"/>
          <rect x="10" y="10" width="6" height="6" rx="1.5" fill="white" opacity="0.3"/>
        </svg>
      </div>
      <h1>Design System Docs</h1>
    </div>
    <p class="subtitle">Select a component in Figma and generate documentation for your design system.</p>

    <div id="componentPill" class="component-pill">
      <div class="pill-dot"></div>
      <div>
        <div class="pill-label">Selected component</div>
        <div class="pill-name" id="componentName"></div>
      </div>
    </div>

    <div id="message" class="message"></div>

    <div id="loading" class="loading">
      <div class="spinner"></div>
      <span>Adding to Figma…</span>
    </div>

    <button id="generateBtn" class="btn btn-primary" onclick="onGenerate()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6.07134 3.63198C6.47 2.46531 8.082 2.42998 8.55467 3.52598L8.59467 3.63265L9.13267 5.20598C9.25596 5.5668 9.45521 5.89699 9.71696 6.17426C9.97871 6.45154 10.2969 6.66945 10.65 6.81331L10.7947 6.86731L12.368 7.40465C13.5347 7.80331 13.57 9.41531 12.4747 9.88798L12.368 9.92798L10.7947 10.466C10.4337 10.5892 10.1034 10.7884 9.82601 11.0502C9.54862 11.3119 9.3306 11.6301 9.18667 11.9833L9.13267 12.1273L8.59534 13.7013C8.19667 14.868 6.58467 14.9033 6.11267 13.808L6.07134 13.7013L5.534 12.128C5.41079 11.767 5.21158 11.4367 4.94983 11.1593C4.68808 10.8819 4.36986 10.6639 4.01667 10.52L3.87267 10.466L2.29933 9.92865C1.132 9.52998 1.09667 7.91798 2.19267 7.44598L2.29933 7.40465L3.87267 6.86731C4.23349 6.74402 4.56368 6.54478 4.84095 6.28303C5.11823 6.02128 5.33614 5.70311 5.48 5.34998L5.534 5.20598L6.07134 3.63198ZM7.33334 4.06265L6.796 5.63598C6.60826 6.18618 6.30285 6.68885 5.90103 7.10898C5.4992 7.52911 5.01063 7.8566 4.46933 8.06865L4.30267 8.12931L2.72933 8.66665L4.30267 9.20398C4.85287 9.39172 5.35554 9.69714 5.77567 10.099C6.19579 10.5008 6.52329 10.9893 6.73534 11.5306L6.796 11.6973L7.33334 13.2706L7.87067 11.6973C8.05841 11.1471 8.36382 10.6444 8.76564 10.2243C9.16747 9.80419 9.65604 9.4767 10.1973 9.26465L10.364 9.20465L11.9373 8.66665L10.364 8.12931C9.8138 7.94157 9.31113 7.63616 8.891 7.23434C8.47088 6.83252 8.14339 6.34395 7.93134 5.80265L7.87134 5.63598L7.33334 4.06265ZM12.6667 1.33331C12.7914 1.33331 12.9136 1.3683 13.0194 1.43429C13.1253 1.50029 13.2105 1.59465 13.2653 1.70665L13.2973 1.78465L13.5307 2.46865L14.2153 2.70198C14.3403 2.74444 14.4499 2.82306 14.5302 2.92786C14.6104 3.03266 14.6578 3.15893 14.6662 3.29066C14.6746 3.4224 14.6437 3.55367 14.5775 3.66784C14.5112 3.78201 14.4126 3.87394 14.294 3.93198L14.2153 3.96398L13.5313 4.19731L13.298 4.88198C13.2555 5.00693 13.1768 5.11645 13.072 5.19664C12.9671 5.27684 12.8408 5.32411 12.7091 5.33246C12.5774 5.34082 12.4461 5.30988 12.332 5.24357C12.2179 5.17726 12.126 5.07856 12.068 4.95998L12.036 4.88198L11.8027 4.19798L11.118 3.96465C10.993 3.92218 10.8834 3.84357 10.8032 3.73877C10.7229 3.63397 10.6756 3.5077 10.6672 3.37597C10.6587 3.24423 10.6896 3.11296 10.7559 2.99879C10.8221 2.88462 10.9208 2.79269 11.0393 2.73465L11.118 2.70265L11.802 2.46931L12.0353 1.78465C12.0803 1.65293 12.1653 1.53859 12.2786 1.45765C12.3918 1.37671 12.5275 1.33323 12.6667 1.33331Z" fill="white"/>
      </svg>
      Generate documentation
    </button>
  </div>

  <div class="preview-container">
    <div id="previewEmpty" class="preview-empty">
      <div>Select a component to preview documentation</div>
    </div>
    <div id="previewLoading" class="preview-loading">
      <div class="spinner"></div>
      <span>Generating documentation…</span>
    </div>
    <div id="previewSection" class="preview-section">
      <div class="preview-content">
        <div id="editPane" class="preview-pane active"></div>
      </div>
      <div class="preview-footer">
        <button id="addDocBtn" class="btn btn-primary" onclick="onAddDocumentation()">Add to Figma</button>
      </div>
    </div>
  </div>

  <script>
    // ── State ────────────────────────────────────────────────────────────────
    let pendingComponentName = null;
    let pendingIsKnownComponent = false;
    let pendingColors = [];

    // ── Bin icon SVG ─────────────────────────────────────────────────────────
    const BIN_ICON = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9.52 1.33334C9.79984 1.33342 10.0726 1.42153 10.2995 1.58522C10.5265 1.7489 10.6962 1.97984 10.7847 2.24534L11.1467 3.33334H13.3333C13.5101 3.33334 13.6797 3.40358 13.8047 3.52861C13.9298 3.65363 14 3.8232 14 4.00001C14 4.17682 13.9298 4.34639 13.8047 4.47141C13.6797 4.59644 13.5101 4.66668 13.3333 4.66668L13.3313 4.71401L12.7533 12.8093C12.7173 13.3138 12.4915 13.7858 12.1214 14.1304C11.7513 14.475 11.2644 14.6666 10.7587 14.6667H5.24133C4.73564 14.6666 4.24874 14.475 3.87864 14.1304C3.50855 13.7858 3.28274 13.3138 3.24667 12.8093L2.66867 4.71334L2.66667 4.66668C2.48986 4.66668 2.32029 4.59644 2.19526 4.47141C2.07024 4.34639 2 4.17682 2 4.00001C2 3.8232 2.07024 3.65363 2.19526 3.52861C2.32029 3.40358 2.48986 3.33334 2.66667 3.33334H4.85333L5.21533 2.24534C5.3038 1.97974 5.47362 1.74871 5.70073 1.58502C5.92784 1.42133 6.20071 1.33328 6.48067 1.33334H9.52ZM11.998 4.66668H4.002L4.57667 12.714C4.58863 12.8821 4.66385 13.0395 4.78717 13.1544C4.9105 13.2693 5.07277 13.3333 5.24133 13.3333H10.7587C10.9272 13.3333 11.0895 13.2693 11.2128 13.1544C11.3362 13.0395 11.4114 12.8821 11.4233 12.714L11.998 4.66668ZM6.66667 6.66668C6.82996 6.6667 6.98756 6.72665 7.10958 6.83515C7.23161 6.94366 7.30956 7.09318 7.32867 7.25534L7.33333 7.33334V10.6667C7.33315 10.8366 7.26808 11 7.15143 11.1236C7.03479 11.2471 6.87536 11.3215 6.70574 11.3315C6.53611 11.3414 6.36908 11.2862 6.23878 11.1772C6.10848 11.0681 6.02474 10.9134 6.00467 10.7447L6 10.6667V7.33334C6 7.15653 6.07024 6.98696 6.19526 6.86194C6.32029 6.73691 6.48986 6.66668 6.66667 6.66668ZM9.33333 6.66668C9.51014 6.66668 9.67971 6.73691 9.80474 6.86194C9.92976 6.98696 10 7.15653 10 7.33334V10.6667C10 10.8435 9.92976 11.0131 9.80474 11.1381C9.67971 11.2631 9.51014 11.3333 9.33333 11.3333C9.15652 11.3333 8.98695 11.2631 8.86193 11.1381C8.7369 11.0131 8.66667 10.8435 8.66667 10.6667V7.33334C8.66667 7.15653 8.7369 6.98696 8.86193 6.86194C8.98695 6.73691 9.15652 6.66668 9.33333 6.66668ZM9.52 2.66668H6.48L6.258 3.33334H9.742L9.52 2.66668Z" fill="currentColor"/></svg>';

    // ── Section card helpers ─────────────────────────────────────────────────
    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = textarea.scrollHeight + 'px';
    }

    function collectSections() {
      return Array.from(document.querySelectorAll('.section-body-textarea')).map(function(ta) {
        var lines = ta.value.split('\n');
        var title = '';
        var bodyStart = 0;
        if (lines[0] && lines[0].startsWith('## ')) {
          title = lines[0].slice(3).trim();
          bodyStart = 1;
          while (bodyStart < lines.length && !lines[bodyStart].trim()) bodyStart++;
        }
        return { title: title, body: lines.slice(bodyStart).join('\n').trim() };
      });
    }

    function createSectionCard(section) {
      var card = document.createElement('div');
      card.className = 'section-card';

      var deleteBtn = document.createElement('button');
      deleteBtn.className = 'section-delete-btn';
      deleteBtn.innerHTML = BIN_ICON;
      deleteBtn.title = 'Delete section';
      deleteBtn.addEventListener('click', function() {
        card.remove();
      });

      var bodyTextarea = document.createElement('textarea');
      bodyTextarea.className = 'section-body-textarea';
      var content = section.title ? '## ' + section.title + '\n\n' + section.body : section.body;
      bodyTextarea.value = content;
      bodyTextarea.placeholder = '## Section title\n\nSection content…';
      bodyTextarea.addEventListener('input', function() {
        autoResize(this);
      });

      card.appendChild(deleteBtn);
      card.appendChild(bodyTextarea);
      return card;
    }

    function renderSectionCards(sections) {
      var editPane = document.getElementById('editPane');
      editPane.innerHTML = '';

      sections.forEach(function(section) {
        editPane.appendChild(createSectionCard(section));
      });

      var addBtn = document.createElement('button');
      addBtn.className = 'btn-add-section';
      addBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 1.75v10.5M1.75 7h10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>New section';
      addBtn.addEventListener('click', addSection);
      editPane.appendChild(addBtn);
    }

    function addSection() {
      var editPane = document.getElementById('editPane');
      var addBtn = editPane.querySelector('.btn-add-section');
      var card = createSectionCard({ title: '', body: '' });
      editPane.insertBefore(card, addBtn);
      card.querySelector('.section-body-textarea').focus();
    }

    // ── Show edit section with content ───────────────────────────────────────
    function showPreview(name) {
      try {
        var sections = buildSections(name, pendingColors);
        renderSectionCards(sections);
        document.getElementById('previewEmpty').style.display = 'none';
        document.getElementById('previewLoading').classList.remove('visible');
        document.getElementById('previewSection').classList.add('visible');
        document.querySelectorAll('.section-body-textarea').forEach(autoResize);
      } catch (error) {
        console.error('Error in showPreview:', error);
      }
    }

    // ── Hide edit section ────────────────────────────────────────────────────
    function hidePreview() {
      document.getElementById('previewSection').classList.remove('visible');
      document.getElementById('previewLoading').classList.remove('visible');
      document.getElementById('previewEmpty').style.display = 'flex';
      document.getElementById('editPane').innerHTML = '';
    }

    // ── Receive messages from plugin code ────────────────────────────────────
    window.onmessage = function(event) {
      var msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'selection-changed') {
        if (msg.componentName) {
          pendingComponentName = msg.componentName;
          pendingIsKnownComponent = msg.isKnownComponent;
          document.getElementById('componentName').textContent = msg.componentName;
          document.getElementById('componentPill').classList.add('visible');
          hidePreview();
          if (!msg.isKnownComponent) {
            showMessage("This doesn't look like a standard design system component. Try selecting a more common component like a Button or Alert.", 'warning');
            document.getElementById('generateBtn').disabled = true;
          } else {
            hideMessage();
            document.getElementById('generateBtn').disabled = false;
          }
        } else {
          pendingComponentName = null;
          pendingIsKnownComponent = false;
          document.getElementById('componentPill').classList.remove('visible');
          document.getElementById('generateBtn').disabled = false;
          hidePreview();
          if (msg.nodeType) {
            var label = msg.nodeType.charAt(0) + msg.nodeType.slice(1).toLowerCase().replace('_', ' ');
            showMessage('Please select a component, not a ' + label + '.', 'error');
          } else {
            hideMessage();
          }
        }
      }

      if (msg.type === 'colors-data') {
        pendingColors = msg.colors || [];
        document.getElementById('generateBtn').disabled = false;
        showPreview(pendingComponentName);
      }

      if (msg.type === 'component-found') {
        renderDocs(msg.componentName);
      }

      if (msg.type === 'error') {
        showMessage(msg.message, 'error');
        setLoading(false);
      }

      if (msg.type === 'success') {
        parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
      }
    };

    // ── Button handlers ──────────────────────────────────────────────────────
    function onGenerate() {
      if (!pendingComponentName) {
        showMessage('Please select a component first.', 'error');
        return;
      }
      hideMessage();

      document.getElementById('previewSection').classList.remove('visible');
      document.getElementById('previewEmpty').style.display = 'none';
      document.getElementById('previewLoading').classList.add('visible');
      document.getElementById('generateBtn').disabled = true;

      parent.postMessage({ pluginMessage: { type: 'get-colors' } }, '*');
    }

    function onAddDocumentation() {
      hideMessage();
      parent.postMessage({ pluginMessage: { type: 'generate-docs' } }, '*');
    }

    // ── Collect sections from cards and send to plugin ────────────────────────
    function renderDocs(name) {
      setLoading(true);
      hideMessage();
      var sections = collectSections();
      // Use edited colour rows from the Characteristics textarea if available
      var colorsForFigma = pendingColors;
      var charSection = sections.find(function(s) { return s.title === 'Characteristics'; });
      if (charSection) {
        var parsed = parseColorsFromBody(charSection.body);
        if (parsed.length > 0) colorsForFigma = parsed;
      }
      parent.postMessage({
        pluginMessage: { type: 'render-docs', componentName: name, sections: sections, colors: colorsForFigma }
      }, '*');
    }

    // ── Characteristics helpers ───────────────────────────────────────────────
    function buildCharacteristicsBody(colors, name) {
      var count = colors ? colors.length : 0;
      var lines = ['### Colours'];
      if (count === 0) {
        lines.push('No fill colours were detected in this component.');
      } else {
        var countText = count === 1 ? 'this 1 colour' : 'these ' + count + ' colours';
        lines.push((name + 's') + ' use ' + countText + ':');
        colors.forEach(function(c) {
          lines.push(c.name + ', ' + c.hex.toUpperCase());
        });
      }
      return lines.join('\n');
    }

    function parseColorsFromBody(body) {
      return body.split('\n')
        .map(function(line) { return line.trim(); })
        .filter(function(line) { return /,\s*#[0-9a-fA-F]{6}$/i.test(line); })
        .map(function(line) {
          var lastComma = line.lastIndexOf(', ');
          if (lastComma === -1) lastComma = line.lastIndexOf(',');
          return { name: line.slice(0, lastComma).trim(), hex: line.slice(lastComma + 1).trim() };
        });
    }

    // ── Generic documentation template ───────────────────────────────────────
    function buildSections(name, colors) {
      return [
        {
          title: 'Introduction',
          body:

    // ── UI helpers ───────────────────────────────────────────────────────────
    function setLoading(on) {
      document.getElementById('loading').classList.toggle('visible', on);
      document.getElementById('generateBtn').disabled = on;
      document.getElementById('addDocBtn').disabled = on;
    }

    function showMessage(text, type) {
      var el = document.getElementById('message');
      var icons = {
        error:   '<svg class="message-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="7" cy="7" r="7" fill="#c0392b"/><rect x="6.3" y="3.5" width="1.4" height="4.2" rx="0.7" fill="white"/><rect x="6.3" y="9.1" width="1.4" height="1.4" rx="0.7" fill="white"/></svg>',
        warning: '<svg class="message-icon" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 1L13.0622 12H0.937822L7 1Z" fill="#d97706"/><rect x="6.3" y="5.5" width="1.4" height="3.5" rx="0.7" fill="white"/><rect x="6.3" y="9.8" width="1.4" height="1.4" rx="0.7" fill="white"/></svg>',
      };
      el.innerHTML = (icons[type] || '') + '<span>' + text + '</span>';
      el.className = 'message ' + type + ' visible';
    }

    function hideMessage() {
      document.getElementById('message').className = 'message';
    }
