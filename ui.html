    body {

      flex-direction: column;
      align-items: left;
      gap: 12px;
      margin-bottom: 8px;
    }
    .icon {
      width: 32px;
      height: 32px;
      background: var(--color-brand-primary);
      border-radius: var(--border-radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .icon svg { display: block; }
    h1 { font-size: 15px; font-weight: 600; color: var(--color-text-primary); }

      font-size: var(--font-size-md);
      color: var(--color-text-secondary);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* ── Component pill ── */
    .component-pill {
      display: none;
      align-items: center;
      gap: 10px;
      background: #f4f3ff;
      border: 1px solid #dddaff;
      border-radius: var(--border-radius-md);
      padding: 10px 16px;
      margin-bottom: 12px;
    }
    .component-pill.visible { display: flex; }
    .pill-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--color-brand-primary);
      flex-shrink: 0;
    }
    .pill-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 2px; }
    .pill-name  { font-size: var(--font-size-md); font-weight: 600; color: var(--color-brand-secondary); }

    /* ── Message ── */
    .message {
      display: none;
      padding: 10px 10px;
      border-radius: var(--border-radius-md);
      font-size: 12px;
      margin-bottom: 16px;
      line-height: 1.5;
    }
    .message.visible { display: flex; align-items: flex-start; gap: 6px; }
    .message.error   { background: #FEF3F2; color: #D92D20; border: 1px solid #FECDCA; }
    .message.warning { background: #FFFAEB; color: #B54708; border: 1px solid #FEDF89; }
    .message-icon { flex-shrink: 0; width: 18px; height: 18px; }
    .message.success { background: #ECFDF3; color: #027A48; border: 1px solid #A6F4C5; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--color-border);
      border-top-color: var(--color-brand-primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 10px 16px;
      border-radius: var(--border-radius-md);
      font-size: var(--font-size-md);
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s, opacity 0.15s;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary { background: var(--color-brand-primary); color: #fff; }
    .btn-primary:not(:disabled):hover { background: var(--color-brand-secondary); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn .spinner { width: 14px; height: 14px; border-color: rgba(255,255,255,0.4); border-top-color: #fff; }


    /* ── Preview Section ── */
    .preview-section {
      display: none;
      height: 100%;
    }
    .preview-section.visible { display: flex; flex-direction: column; }

    .preview-content {
      flex: 1;
      overflow-y: auto;
      background: white;
      display: flex;
      flex-direction: column;
    }
    .preview-pane {
      display: none;
      padding: 24px;
      flex: 1;
      overflow-y: auto;

69 6.98696 8.86193 6.86194C8.98695 6.73691 9.15652 6.66668 9.33333 6.66668ZM9.52 2.66668H6.48L6.258 3.33334H9.742L9.52 2.66668Z" fill="currentColor"/></svg>';

    // ── Section card helpers ─────────────────────────────────────────────────
    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = textarea.scrollHeight + 'px';
    }

    function collectSections() {
      return Array.from(document.querySelectorAll('.section-body-textarea')).map(function(ta) {
        var lines = ta.value.split('\n');
        var title = '';
        var bodyStart = 0;
        if (lines[0] && lines[0].startsWith('# ')) {
          title = lines[0].slice(2).trim();
          bodyStart = 1;
          while (bodyStart < lines.length && !lines[bodyStart].trim()) bodyStart++;
        }
        return { title: title, body: lines.slice(bodyStart).join('\n').trim() };
      });
    }

    function createSectionCard(section) {
      var card = document.createElement('div');
      card.className = 'section-card';

      var deleteBtn = document.createElement('button');
      deleteBtn.className = 'section-delete-btn';
      deleteBtn.innerHTML = BIN_ICON;
      deleteBtn.title = 'Delete section';
      deleteBtn.addEventListener('click', function() {
        card.remove();
      });

      var bodyTextarea = document.createElement('textarea');
      bodyTextarea.className = 'section-body-textarea';
      var content = section.title ? '# ' + section.title + '\n\n' + section.body : section.body;
      bodyTextarea.value = content;
      bodyTextarea.placeholder = '# Section title\n\nSection content…';
      bodyTextarea.addEventListener('input', function() {
        autoResize(this);
      });

      card.appendChild(deleteBtn);
      card.appendChild(bodyTextarea);
      return card;
    }

    function renderSectionCards(sections) {
      var editPane = document.getElementById('editPane');
      editPane.innerHTML = '';

      sections.forEach(function(section) {
        editPane.appendChild(createSectionCard(section));
      });

      var addBtn = document.createElement('button');
      addBtn.className = 'btn-add-section';
      addBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 1.75v10.5M1.75 7h10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>New section';
      addBtn.addEventListener('click', addSection);
      editPane.appendChild(addBtn);
    }

    function addSection() {
      var editPane = document.getElementById('editPane');
      var addBtn = editPane.querySelector('.btn-add-section');
      var card = createSectionCard({ title: '', body: '' });
      editPane.insertBefore(card, addBtn);
      card.querySelector('.section-body-textarea').focus();
    }

    // ── Show edit section with content ───────────────────────────────────────
    async function showPreview(name) {
      try {
        var sections = await buildSections(name, pendingColors, pendingProperties, pendingVariants, pendingDescription);
        renderSectionCards(sections);
        document.getElementById('previewEmpty').style.display = 'none';
        document.getElementById('previewLoading').classList.remove('visible');
        document.getElementById('previewSection').classList.add('visible');
        document.getElementById('generateBtn').disabled = false;
        document.querySelectorAll('.section-body-textarea').forEach(autoResize);
      } catch (error) {
        console.error('Error in showPreview:', error);
        document.getElementById('previewLoading').classList.remove('visible');
        document.getElementById('previewEmpty').style.display = 'flex';
        document.getElementById('generateBtn').disabled = false;
        showMessage(error.message || 'Failed to generate documentation.', 'error');
      }
    }

    // ── Hide edit section ────────────────────────────────────────────────────
    function hidePreview() {
      document.getElementById('previewSection').classList.remove('visible');
      document.getElementById('previewLoading').classList.remove('visible');
      document.getElementById('previewEmpty').style.display = 'flex';
      document.getElementById('editPane').innerHTML = '';
    }

    // ── Receive messages from plugin code ────────────────────────────────────
    window.onmessage = function(event) {
      var msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'selection-changed') {
        if (msg.componentName) {
          pendingComponentName = msg.componentName;
          pendingIsKnownComponent = msg.isKnownComponent;
          document.getElementById('componentName').textContent = msg.componentName;
          document.getElementById('componentPill').classList.add('visible');
          hidePreview();
          if (!msg.isKnownComponent) {
            showMessage("This doesn't look like a standard design system component. Try selecting a more common component like a Button or Alert.", 'warning');
            document.getElementById('generateBtn').disabled = true;
          } else {
            hideMessage();
            document.getElementById('generateBtn').disabled = false;
          }
        } else {
          pendingComponentName = null;
          pendingIsKnownComponent = false;
          document.getElementById('componentPill').classList.remove('visible');
          document.getElementById('generateBtn').disabled = false;
          hidePreview();
          if (msg.nodeType === 'MULTIPLE_COMPONENTS') {
            showMessage('Please select one component at a time.', 'error');
          } else if (msg.nodeType) {
            showMessage('Please select a component.', 'error');
          } else {
            hideMessage();
          }
        }
      }

      if (msg.type === 'colors-data') {
        pendingColors = msg.colors || [];
        pendingProperties = msg.properties || [];
        pendingVariants = msg.variants || [];
        pendingDescription = msg.description || '';
        showPreview(pendingComponentName);
      }

      if (msg.type === 'component-found') {
        renderDocs(msg.componentName);
      }

      if (msg.type === 'error') {
        showMessage(msg.message, 'error');
        setLoading(false);
      }

      if (msg.type === 'success') {
        parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
      }
    };

    // ── Button handlers ──────────────────────────────────────────────────────
    function onGenerate() {
      if (!pendingComponentName) {
        showMessage('Please select a component.', 'error');
        return;
      }
      hideMessage();

      document.getElementById('previewSection').classList.remove('visible');
      document.getElementById('previewEmpty').style.display = 'none';
      document.getElementById('previewLoading').classList.add('visible');
      document.getElementById('generateBtn').disabled = true;

      parent.postMessage({ pluginMessage: { type: 'get-colors' } }, '*');
    }

    function onAddDocumentation() {
      hideMessage();
      parent.postMessage({ pluginMessage: { type: 'generate-docs' } }, '*');
    }

    // ── Collect sections from cards and send to plugin ────────────────────────
    function renderDocs(name) {
      setLoading(true);
      hideMessage();
      var sections = collectSections();
      // Use edited colour/property rows from the Characteristics textarea if available
      var colorsForFigma = pendingColors;
      var propertiesForFigma = pendingProperties;
      var charSection = sections.find(function(s) { return s.title === 'Characteristics'; });
      if (charSection) {
        var parsed = parseColorsFromBody(charSection.body);
        if (parsed.length > 0) colorsForFigma = parsed;
        propertiesForFigma = parsePropertiesFromBody(charSection.body);
      }
      parent.postMessage({
        pluginMessage: { type: 'render-docs', componentName: name, sections: sections, colors: colorsForFigma, properties: propertiesForFigma, variants: pendingVariants }
      }, '*');
    }

    // ── Characteristics helpers ───────────────────────────────────────────────
    function buildCharacteristicsBody(colors, name, properties) {
      var lines = [];
      if (properties && properties.length > 0) {
        lines.push('## Properties');
        properties.forEach(function(prop) {
          lines.push(prop.name + ' | ' + prop.type);
          lines.push(prop.description || 'Lorem ipsum dolor sit amet, consectetur adipiscing elit.');
        });
        lines.push('');
      }
      var count = colors ? colors.length : 0;
      lines.push('## Colours');
      if (count === 0) {
        lines.push('No fill colours were detected in this component.');
      } else {
        var countText = count === 1 ? 'this 1 colour' : 'these ' + count + ' colours';
        lines.push((name + 's') + ' use ' + countText + ':');
        colors.forEach(function(c) {
          lines.push(c.name + ', ' + c.hex.toUpperCase());
        });
      }
      return lines.join('\n');
    }

    function parseColorsFromBody(body) {
      return body.split('\n')
        .map(function(line) { return line.trim(); })
        .filter(function(line) { return /,\s*#[0-9a-fA-F]{6}$/i.test(line); })
        .map(function(line) {
          var lastComma = line.lastIndexOf(', ');
          if (lastComma === -1) lastComma = line.lastIndexOf(',');
          return { name: line.slice(0, lastComma).trim(), hex: line.slice(lastComma + 1).trim() };
        });
    }

    function buildVariantsBody(variants) {
      var lines = [];
      variants.forEach(function(variant, i) {
        lines.push('## ' + variant.name);
        variant.values.forEach(function(value) {
          lines.push('### ' + value);
          lines.push('Lorem ipsum dolor sit amet, consectetur adipiscing elit.');
        });
        if (i < variants.length - 1) lines.push('');
      });
      return lines.join('\n');
    }

    function parsePropertiesFromBody(body) {
      var inProps = false;
      var props = [];
      var lines = body.split('\n');
      for (var i = 0; i < lines.length; i++) {
        var trimmed = lines[i].trim();
        if (trimmed === '## Properties') { inProps = true; continue; }
        if (inProps && trimmed.startsWith('## ')) { inProps = false; continue; }
        if (inProps) {
          var match = trimmed.match(/^(.+?)\s*\|\s*(text|boolean)$/i);
          if (match) {
            var desc = '';
            // Next non-empty line that isn't a property or heading is the description
            var next = (i + 1 < lines.length) ? lines[i + 1].trim() : '';
            if (next && !next.startsWith('## ') && !next.match(/^.+?\s*\|\s*(text|boolean)$/i)) {
              desc = next;
              i++; // consume description line
            }
            props.push({ name: match[1].trim(), type: match[2].toLowerCase(), description: desc });
          }
        }
      }
      return props;
    }

    // ── AI documentation generation ──────────────────────────────────────────
    async function generateWithAI(componentName, componentDescription) {
      var fetchPromise = fetch('http://localhost:3001/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ componentName: componentName, componentDescription: componentDescription || '' }),
      }).catch(function() {
        throw new Error('Could not reach the local proxy server. Run npm run server first.');
      });

      var minDelay = new Promise(function(resolve) { setTimeout(resolve, 3000); });
      var results = await Promise.all([fetchPromise, minDelay]);
      var response = results[0];

      if (!response.ok) {
        var err = await response.json().catch(function() { return {}; });
        throw new Error(err.error || 'Server error (' + response.status + ').');
      }

      return response.json();
    }

    // ── Documentation sections (AI-generated body text) ──────────────────────
    async function buildSections(name, colors, properties, variants, description) {
      var ai = await generateWithAI(name, description);
      var sections = [
        { title: 'Introduction', body: ai.introduction },
        { title: 'When to use', body: '## When to use\n' + ai.whenToUse + '\n\n## When not to use\n' + ai.whenNotToUse },
        { title: 'Characteristics', body: buildCharacteristicsBody(colors, name, properties) },
      ];
      if (variants && variants.length > 0) {
        sections.push({ title: 'Variants', body: buildVariantsBody(variants) });
      }
      sections.push(
        {
          title: 'General usage guidelines',
          body: '## Content & messaging\n' + ai.contentAndMessaging + '\n\n' +
                '## Alignment & grouping\n' + ai.alignmentAndGrouping + '\n\n' +
                '## Interactions\n' + ai.interactions + '\n\n' +
                '## Accessibility\n' + ai.accessibility,
        },
        { title: 'Responsive guidelines', body: '## Desktop\n' + ai.desktop + '\n\n## Mobile\n' + ai.mobile }
      );
      return sections;
    }

    // ── UI helpers ───────────────────────────────────────────────────────────
    function setLoading(on) {
      var btn = document.getElementById('addDocBtn');
      if (on) {
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div>Adding to Figma\u2026';
      } else {
        btn.disabled = false;
        btn.innerHTML = 'Add to Figma';
      }
      document.getElementById('generateBtn').disabled = on;
    }

    function showMessage(text, type) {
      var el = document.getElementById('message');
      var icons = {
        error:   '<svg class="message-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.99999 1.33325C4.31999 1.33325 1.33333 4.31992 1.33333 7.99992C1.33333 11.6799 4.31999 14.6666 7.99999 14.6666C11.68 14.6666 14.6667 11.6799 14.6667 7.99992C14.6667 4.31992 11.68 1.33325 7.99999 1.33325ZM7.99999 8.66658C7.63333 8.66658 7.33333 8.36658 7.33333 7.99992V5.33325C7.33333 4.96659 7.63333 4.66659 7.99999 4.66659C8.36666 4.66659 8.66666 4.96659 8.66666 5.33325V7.99992C8.66666 8.36658 8.36666 8.66658 7.99999 8.66658ZM8.66666 11.3333H7.33333V9.99992H8.66666V11.3333Z" fill="#D92D20"/></svg>',
        warning: '<svg class="message-icon" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3.3525 15.75H14.6475C15.8025 15.75 16.5225 14.4975 15.945 13.5L10.2975 3.74251C9.72 2.74501 8.28 2.74501 7.7025 3.74251L2.055 13.5C1.4775 14.4975 2.1975 15.75 3.3525 15.75ZM9 10.5C8.5875 10.5 8.25 10.1625 8.25 9.75001V8.25001C8.25 7.83751 8.5875 7.50001 9 7.50001C9.4125 7.50001 9.75 7.83751 9.75 8.25001V9.75001C9.75 10.1625 9.4125 10.5 9 10.5ZM9.75 13.5H8.25V12H9.75V13.5Z" fill="#F79009"/></svg>'
      };
      el.innerHTML = (icons[type] || '') + '<span>' + text + '</span>';
      el.className = 'message ' + type + ' visible';
    }

    function hideMessage() {
      document.getElementById('message').className = 'message';
    }
  </script>
</body>
